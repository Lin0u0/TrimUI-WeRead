name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-trimui:
    name: Build TrimUI Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xz-utils \
            zip \
            unzip \
            libsdl2-dev \
            libsdl2-ttf-dev \
            libsdl2-image-dev \
            libcurl4-openssl-dev

      - name: Install TG5040 toolchain
        run: |
          ./scripts/setup_tg5040_toolchain.sh "$GITHUB_WORKSPACE/build/tg5040-toolchain"
          echo "$GITHUB_WORKSPACE/build/tg5040-toolchain/gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu/bin" >> "$GITHUB_PATH"

      - name: Bootstrap TG5040 SDK
        run: make tg5040-bootstrap

      - name: Run release preflight
        run: make doctor-release

      - name: Run host verification
        run: make test-host

      - name: Run host smoke
        run: make test-smoke

      - name: Build TrimUI packages
        run: make package-all

      - name: Audit TrimUI packages
        run: make package-audit-all

      - name: Upload TrimUI artifacts
        uses: actions/upload-artifact@v6
        with:
          name: trimui-release
          path: |
            dist/WeRead-nextui.tar.gz
            dist/WeRead.pakz
            dist/WeRead-stock-app.tar.gz
            dist/WeRead-crossmix.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - build-trimui
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/WeRead-nextui.tar.gz
            dist/WeRead.pakz
            dist/WeRead-stock-app.tar.gz
            dist/WeRead-crossmix.tar.gz
