name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install native SDL2 dependencies
        run: sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev libcurl4-openssl-dev

      - name: Bootstrap TG5040 SDK
        run: make tg5040-bootstrap

      - name: Build all packages
        run: make package-all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/WeRead-nextui.tar.gz
            dist/WeRead-stock-app.tar.gz
            dist/WeRead-crossmix.tar.gz
            dist/WeRead-macos.tar.gz
